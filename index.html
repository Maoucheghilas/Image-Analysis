<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Forensics POC</title>
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .upload-box {
      border: 2px dashed #bbb;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      margin-bottom: 25px;
      background: #fafafa;
    }

    input[type="file"] {
      margin-top: 15px;
    }

    img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 20px;
    }

    .report {
      margin-top: 30px;
      padding: 20px;
      background: #f8fbff;
      border-radius: 12px;
      border: 1px solid #dbe8f5;
    }

    .report h2 {
      margin-bottom: 15px;
    }

    .item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .label {
      font-weight: bold;
    }

    .muted {
      color: #777;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Photo Forensics Analyzer</h1>

    <div class="upload-box">
      <p>Choisissez une image pour analyser ses métadonnées</p>
      <input type="file" id="imageInput" accept="image/*" />
      <p class="muted">Formats supportés : JPG, JPEG, PNG (EXIF surtout sur JPG)</p>
    </div>

    <img id="preview" style="display:none;" />

    <div class="report" id="report" style="display:none;">
      <h2>Rapport d'analyse</h2>
      <div id="reportContent"></div>
          <div class="report" id="editor" style="display:none; margin-top:20px;">
        <h2>Modifier tous les paramètres EXIF simulés</h2>
        <div class="item"><label class="label">Marque appareil :</label><br><input id="editMake" style="width:100%; padding:10px; margin-top:8px;" /></div>
        <div class="item"><label class="label">Modèle appareil :</label><br><input id="editModel" style="width:100%; padding:10px; margin-top:8px;" /></div>
        <div class="item"><label class="label">Date de prise :</label><br><input id="editDate" style="width:100%; padding:10px; margin-top:8px;" placeholder="2026:04:18 14:30:00" /></div>
        <div class="item"><label class="label">Coordonnées GPS :</label><br><input id="editGPS" style="width:100%; padding:10px; margin-top:8px;" placeholder="48.8566, 2.3522" /></div>
        <div class="item"><label class="label">Logiciel :</label><br><input id="editSoftware" style="width:100%; padding:10px; margin-top:8px;" /></div>
        <div class="item"><label class="label">Auteur :</label><br><input id="editAuthor" style="width:100%; padding:10px; margin-top:8px;" /></div>
        <div class="item"><label class="label">Copyright :</label><br><input id="editCopyright" style="width:100%; padding:10px; margin-top:8px;" /></div>
        <div class="item"><label class="label">Note :</label><br><input id="editNote" style="width:100%; padding:10px; margin-top:8px;" placeholder="Ajoutez un commentaire" /></div>
        <button id="downloadBtn" style="margin-top:20px; padding:12px 20px; border:none; border-radius:10px; cursor:pointer;">Télécharger la nouvelle image</button>
      </div>
    </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const report = document.getElementById('report');
    const reportContent = document.getElementById('reportContent');
    const editor = document.getElementById('editor');
    const editMake = document.getElementById('editMake');
    const editModel = document.getElementById('editModel');
    const editDate = document.getElementById('editDate');
    const editGPS = document.getElementById('editGPS');
    const editSoftware = document.getElementById('editSoftware');
    const editAuthor = document.getElementById('editAuthor');
    const editCopyright = document.getElementById('editCopyright');
    const editNote = document.getElementById('editNote');
    const downloadBtn = document.getElementById('downloadBtn');

    function addItem(label, value) {
      return `
        <div class="item">
          <span class="label">${label} :</span> ${value || 'Non disponible'}
        </div>
      `;
    }

    imageInput.addEventListener('change', function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = 'block';

        preview.onload = function () {
          EXIF.getData(preview, function () {
            const allMetaData = EXIF.getAllTags(this);

            const make = allMetaData.Make || 'Inconnu';
            const model = allMetaData.Model || 'Inconnu';
            const software = allMetaData.Software || 'Non détecté';
            const dateTime = allMetaData.DateTime || 'Inconnue';
            const artist = allMetaData.Artist || 'Non défini';
            const copyright = allMetaData.Copyright || 'Non défini';
            const xResolution = allMetaData.XResolution || 'Inconnue';
            const yResolution = allMetaData.YResolution || 'Inconnue';

            const edited = software !== 'Non détecté' ? 'OUI (possible modification)' : 'Probablement NON';

            reportContent.innerHTML = '';
            reportContent.innerHTML += addItem('Nom du fichier', file.name);
            reportContent.innerHTML += addItem('Taille', `${(file.size / 1024).toFixed(2)} KB`);
            reportContent.innerHTML += addItem('Type MIME', file.type);
            reportContent.innerHTML += addItem('Marque appareil', make);
            reportContent.innerHTML += addItem('Modèle appareil', model);
            reportContent.innerHTML += addItem('Date de prise', dateTime);
            reportContent.innerHTML += addItem('Logiciel utilisé', software);
            reportContent.innerHTML += addItem('Image modifiée', edited);
            reportContent.innerHTML += addItem('Auteur', artist);
            reportContent.innerHTML += addItem('Copyright', copyright);
            reportContent.innerHTML += addItem('Résolution X', xResolution);
            reportContent.innerHTML += addItem('Résolution Y', yResolution);
            reportContent.innerHTML += addItem('Largeur affichée', preview.naturalWidth + ' px');
            reportContent.innerHTML += addItem('Hauteur affichée', preview.naturalHeight + ' px');

            report.style.display = 'block';
            editor.style.display = 'block';
            editMake.value = make !== 'Inconnu' ? make : '';
            editModel.value = model !== 'Inconnu' ? model : '';
            editDate.value = dateTime !== 'Inconnue' ? dateTime : '';
            editGPS.value = (allMetaData.GPSLatitude && allMetaData.GPSLongitude) ? (allMetaData.GPSLatitude + ', ' + allMetaData.GPSLongitude) : '';
            editSoftware.value = software !== 'Non détecté' ? software : '';
            editAuthor.value = artist !== 'Non défini' ? artist : '';
            editCopyright.value = copyright !== 'Non défini' ? copyright : '';
          });
        };
      };

      reader.readAsDataURL(file);
    });
    downloadBtn.addEventListener('click', function () {
      if (!preview.src) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = preview.naturalWidth;
      canvas.height = preview.naturalHeight + 180;

      ctx.drawImage(preview, 0, 0);

      ctx.font = '24px Arial';
      ctx.fillText('Marque: ' + (editMake.value || 'N/A'), 20, preview.naturalHeight + 40);
      ctx.fillText('Modèle: ' + (editModel.value || 'N/A'), 20, preview.naturalHeight + 80);
      ctx.fillText('Date: ' + (editDate.value || 'N/A'), 20, preview.naturalHeight + 120);
      ctx.fillText('GPS: ' + (editGPS.value || 'N/A'), 20, preview.naturalHeight + 160);
      ctx.fillText('Logiciel: ' + (editSoftware.value || 'N/A'), 20, preview.naturalHeight + 200);
      ctx.fillText('Auteur: ' + (editAuthor.value || 'N/A'), 20, preview.naturalHeight + 240);
      ctx.fillText('Copyright: ' + (editCopyright.value || 'N/A'), 20, preview.naturalHeight + 280);
      ctx.fillText('Note: ' + (editNote.value || 'N/A'), 20, preview.naturalHeight + 320);
      ctx.fillText('Generated by Photo Forensics Analyzer', 20, preview.naturalHeight + 360);

      const link = document.createElement('a');
      link.download = 'photo_modified.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

  </script>
</body>
</html>
